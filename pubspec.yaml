name: tunometescabra
description: "Un juego de dominó con trampa y castigo."
# Prevenir publicaciones accidentales en pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Añadimos el gestor de estado Provider.
  # Esencial para conectar la lógica del juego con la UI.
  provider: ^6.1.2

  # Iconos de Cupertino para un estilo iOS.
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Para añadir assets como imágenes, descomenta esta sección:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # Para añadir fuentes personalizadas, descomenta esta sección:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
