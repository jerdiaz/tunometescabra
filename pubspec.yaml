name: tunometescabra
description: "Un juego de dominó con trampa y castigo."
# Prevenir publicaciones accidentales en pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  cupertino_icons: ^1.0.2

  # Firebase para multijugador online
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # La sección de assets está correctamente declarada aquí.
  assets:
    - assets/images/

  # Para añadir fuentes personalizadas, la sección 'fonts' iría aquí.
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic

# ----- CORRECCIÓN CLAVE AQUÍ -----
# Esta sección estaba incorrectamente indentada.
# Ahora está al nivel raíz, como 'flutter:', 'dependencies:', etc.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"